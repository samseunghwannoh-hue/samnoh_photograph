<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sam Noh — Photography</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav><div class="brand">Sam Noh</div></nav>

  <!-- Fixed title shown for sections 2+ -->
  <div id="fixed-label">
    <span class="label-text"></span>
  </div>

  <!-- ── Section 1: Hero (full-bleed) ──────────────────────── -->
  <section class="section--full section--hero" data-title="Solitude">
    <a href="projects/solitude.html" class="section-link" aria-label="Sam Noh"></a>
    <div class="bg" style="background-image: url('./images/image_01.jpg')"></div>
    <div class="info">
      <h1 class="title">Solitude</h1>
    </div>
  </section>

  <!-- ── Section 2: Full-bleed ─────────────────────────────── -->
  <section class="section--full" data-title="Urban Drift">
    <a href="projects/urban-drift.html" class="section-link" aria-label="Winter 02"></a>
    <div class="bg" style="background-image: url('./images/image_02.jpg')"></div>
  </section>

  <!-- ── Section 3: Full-bleed ─────────────────────────────── -->
  <section class="section--full" data-title="Last Light">
    <a href="projects/last-light.html" class="section-link" aria-label="Cold Winter"></a>
    <div class="bg" style="background-image: url('./images/image_03.jpg')"></div>
  </section>

  <!-- ── Section 4: Full-bleed ─────────────────────────────── -->
  <section class="section--full" data-title="In Between">
    <a href="projects/in-between.html" class="section-link" aria-label="Warm Winter"></a>
    <div class="bg" style="background-image: url('./images/image_04.jpg')"></div>
  </section>

  <!-- ── Section 5: Full-bleed ─────────────────────────────── -->
  <section class="section--full" data-title="Silhouette">
    <a href="projects/silhouette.html" class="section-link" aria-label="Silhouette"></a>
    <div class="bg" style="background-image: url('./images/image_05.jpg')"></div>
  </section>

  <!-- ── Section 6: Video ──────────────────────────────────── -->
  <section class="section--video" data-title="Motion" style="background: #0a0a0a">
    <a href="projects/motion.html" class="section-link" aria-label="Motion"></a>
    <video class="bg-video" autoplay muted loop playsinline
           src="./images/video_01.mp4"></video>
    <div class="vignette"></div>
  </section>

  <!-- ── Section 7: Framed (centred) ───────────────────────── -->
  <section class="section--framed" data-title="Studio" style="background: #fadadd">
    <a href="projects/studio.html" class="section-link" aria-label="Studio"></a>
    <div class="frame">
      <img src="https://picsum.photos/seed/sn-frm/1920/1280" alt="Studio" />
    </div>
  </section>

  <!-- ── Section 8: Framed-right ───────────────────────────── -->
  <section class="section--framed-right" data-title="Tangent" style="background: #1a1714">
    <a href="projects/tangent.html" class="section-link" aria-label="Tangent"></a>
    <div class="frame">
      <img src="https://picsum.photos/seed/sn-frt/1920/1280" alt="Tangent" />
    </div>
  </section>

  <!-- ── Section 9: Sized (portrait) ──────────────────────── -->
  <section class="section--sized" data-title="Form" style="background: #0e1216">
    <a href="projects/form.html" class="section-link" aria-label="Form"></a>
    <div class="frame">
      <img src="https://picsum.photos/seed/sn-sz/1280/1920" alt="Form" />
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
